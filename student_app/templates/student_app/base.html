{% load static %}
<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AB Normal College</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Theme Config -->
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1152d4",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              display: ["Lexend", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;900&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lexend", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display text-slate-900 dark:text-slate-100 transition-colors duration-200"
  >
    <!-- Main Layout -->
    <div class="relative flex h-full w-full flex-col overflow-x-hidden">
      <!-- Navbar -->
      <header
        class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1e2532] px-4 py-3 shadow-sm md:px-10"
      >
        <div class="flex items-center gap-8">
          <!-- Logo -->
          <div class="flex items-center gap-3 text-primary dark:text-blue-400">
            <span class="material-symbols-outlined text-3xl">school</span>
            <h2
              class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight"
            >
              AB Normal College
            </h2>
          </div>
          <!-- Desktop Navigation -->
          <nav class="hidden md:flex items-center gap-6">
            <a
                class="text-sm font-medium leading-normal transition-colors
                        {% if request.resolver_match.url_name == 'home' %}
                        text-primary font-semibold
                        {% else %}
                        text-slate-600 dark:text-slate-400 hover:text-primary
                        {% endif %}"
                href="{% url 'home' %}"
                >Dashboard</a>
            <a
                class="text-sm font-medium leading-normal transition-colors
                        {% if request.resolver_match.url_name == 'academics' %}
                        text-primary font-semibold
                        {% else %}
                        text-slate-600 dark:text-slate-400 hover:text-primary
                        {% endif %}"
                href="{% url 'academics' %}"
                >Academics</a>
            <a
              class="text-sm font-medium leading-normal transition-colors
                        {% if request.resolver_match.url_name == 'library' %}
                        text-primary font-semibold
                        {% else %}
                        text-slate-600 dark:text-slate-400 hover:text-primary
                        {% endif %}"
                href="{% url 'library' %}"
                >Library</a>
            
            <a
              class="text-sm font-medium leading-normal transition-colors
                        {% if request.resolver_match.url_name == 'finance' %}
                        text-primary font-semibold
                        {% else %}
                        text-slate-600 dark:text-slate-400 hover:text-primary
                        {% endif %}"
                href="{% url 'finance' %}"
                >Finance</a>
            <a
              class="text-sm font-medium leading-normal transition-colors
                        {% if request.resolver_match.url_name == 'settings' %}
                        text-primary font-semibold
                        {% else %}
                        text-slate-600 dark:text-slate-400 hover:text-primary
                        {% endif %}"
                href="{% url 'settings' %}"
                >Settings</a>
          </nav>
        </div>
        <div class="flex flex-1 justify-end gap-6 items-center">
          <!-- Search Bar -->
          <div
            class="hidden sm:flex w-full max-w-xs items-center rounded-lg bg-slate-100 dark:bg-slate-800 px-3 py-2"
          >
            <span
              class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-[20px]"
              >search</span
            >
            <input
              class="w-full bg-transparent px-2 text-sm text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-slate-400 focus:outline-none"
              placeholder="Search resources..."
            />
          </div>
          <!-- User Profile -->
          <div
            aria-label="User profile picture"
            class="h-10 w-10 overflow-hidden rounded-full bg-slate-200 border-2 border-white shadow-sm dark:border-slate-700"
            role="img"
          >
            <img
              alt="Portrait of Alex Student"
              class="h-full w-full object-cover"
              data-alt="Portrait of Alex Student"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOrzV-hUVWJeqOMNbcknE3G8lc_H-7Nppn1ZsgOMgd6HRrHjzgilTmF6micrWdA953-FDu7-6cxhPqMhlpBEBC0AEz7niSQyUf4OBsy401OqwJ7ydgRqRb5GGjRtcTTRL_svATkGQ58qIPm_62D4balmBX0n055iw8kQ4YKhXwk_3221ntILtebq0Pp9X_P5AlVc1RnGvRsW7-rsmsK4DUmiDsuzMhv2Sldo9vshm8TrJ-90uC8jrpUoM-97lTi8-hrIkTozErNXBi"
            />
          </div>
        </div>
      </header>
      {% block content %}
      {% endblock %}
    </div>
  </body>
</html>
